<!DOCTYPE html>
<html>
<head>
    <title>Mood Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>How are you feeling today?</h1>
    
    <div class="mood-buttons">
        <button id="happy-btn">😊 Happy</button>
        <button id="sad-btn">😢 Sad</button>
        <button id="excited-btn">🤩 Excited</button>
        <button id="angry-btn">😠 Angry</button>
    </div>
    
    <button id="submit-btn">Submit My Mood</button>
    
    <div id="selected-mood"></div>
    
    <div id="recent-moods">
        <h3>Recent Moods</h3>
        <div id="mood-history"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
